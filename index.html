<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Romántico para Valeria 💕</title>
<style>
html { scroll-behavior: smooth; }
body { margin:0; padding:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color:white; text-align:center; overflow-x:hidden; background: linear-gradient(135deg,#ff758c,#ff7eb3); transition: background 2s ease; }
canvas { position:absolute; top:0; left:0; z-index:-1; }

.section { padding:80px 20px; min-height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-shadow: 1px 1px 3px #ff4b6e; }

input, button { padding:12px 20px; border:none; border-radius:25px; margin-top:10px; font-size:16px; }
button { background:#ff4b6e; color:white; cursor:pointer; transition:0.3s; }
button:hover { background:#ff7eb3; transform: scale(1.05); }

#galeria img {
    width:200px;
    border-radius:15px;
    margin:10px;
    box-shadow:0 5px 20px rgba(0,0,0,0.4);
    transition:0.3s;
}
#galeria img:hover { transform: scale(1.1); }

#carta {
    max-width:600px;
    margin:auto;
    font-size:1.3em;
    white-space:pre-line;
    padding:30px;
    background: rgba(0,0,0,0.4);
    border-radius:20px;
    border: 2px solid #ff7eb3;
    text-shadow: 2px 2px 4px #000;
    box-shadow: 0 0 15px rgba(255,255,255,0.2);
}

.corazon, .confeti, .nieve, .cursorParticula, .miniFoto { position:absolute; pointer-events:none; user-select:none; z-index:10; text-shadow: 0 0 5px #fff, 0 0 10px #ff4b6e, 0 0 15px #ff7eb3; }

.miniFoto {
    width:80px;
    height:auto;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

nav { position:fixed; top:0; left:0; width:100%; background: rgba(255,75,110,0.6); display:flex; justify-content:center; gap:20px; padding:10px 0; z-index:20; border-bottom:1px solid #fff; }
nav a { color:white; font-weight:bold; text-decoration:none; transition:0.3s; }
nav a:hover { color:#ffbb00; }
</style>
</head>
<body>

<canvas id="galaxia"></canvas>

<nav>
<a href="#login">Login</a>
<a href="#galeriaSection">Galería</a>
<a href="#cartaSection">Carta</a>
<a href="#juegoSection">Mini-juego</a>
</nav>

<div class="section" id="login">
<h1>🔒 Área exclusiva para Valeria</h1>
<p>Ingresa la palabra secreta 💌</p>
<input type="password" id="password"><br>
<button onclick="verificar()">Entrar</button>
</div>

<div class="section hidden" id="galeriaSection">
<h1>📸 Nuestra Galería</h1>
<input type="file" id="subirFotos" multiple accept="image/*"><br><br>
<button onclick="borrarFotos()">🗑 Borrar todas las fotos</button>
<div id="galeria"></div>
</div>

<div class="section hidden" id="cartaSection">
<h1>💌 Carta para ti</h1>
<div id="carta"></div>
<h2 id="contador"></h2>
</div>

<div class="section hidden" id="juegoSection">
<h1>Mini-juego 💖: Atrapá corazones!</h1>
<p>Puntos: <span id="puntos">0</span></p>
</div>

<div id="player" style="display:none;"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let player;
let musicaAutorizada = false; // el usuario autorizó la música

function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        height: '0', width: '0',
        videoId: 'xeaV26R3ifw',
        playerVars: { 'autoplay': 0, 'loop': 1, 'playlist':'xeaV26R3ifw' },
        events: {
            'onReady': (e) => {
                // reproducir si el usuario ya hizo clic
                if(musicaAutorizada) e.target.playVideo();
            }
        }
    });
}

const fechaInicio = new Date("2026-01-08T00:00:00");
const clave = "teamo";

// LOGIN
function verificar(){
    const pass = document.getElementById("password").value;
    if(pass===clave){
        document.getElementById("galeriaSection").classList.remove("hidden");
        document.getElementById("cartaSection").classList.remove("hidden");
        document.getElementById("juegoSection").classList.remove("hidden");
        document.getElementById("login").style.display="none";
        iniciarTodo();

        // usuario hizo clic: desbloquea audio
        musicaAutorizada = true;
        if(player && typeof player.playVideo === "function") player.playVideo();
    } else alert("Esa no es la palabra secreta 💔");
}

function iniciarTodo(){
    actualizarContador();
    setInterval(actualizarContador,1000);
    escribirCarta();
    cargarFotosGuardadas();
    initGalaxia();
    animaciones();
    document.addEventListener("mousemove", particulasCursorThrottled);
    iniciarMiniJuego();
}

// CONTADOR
function actualizarContador(){
    const diff = new Date() - fechaInicio;
    const dias=Math.floor(diff/(1000*60*60*24));
    const hrs=Math.floor((diff/(1000*60*60))%24);
    const min=Math.floor((diff/(1000*60))%60);
    const sec=Math.floor((diff/1000)%60);
    document.getElementById("contador").textContent = `💕 ${dias} días | 🕒 ${hrs} horas | ⏳ ${min} minutos | 💓 ${sec} segundos`;
}

// GALERÍA
document.getElementById("subirFotos").addEventListener("change", function(e){
    Array.from(e.target.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const dataURL = ev.target.result;
            guardarFotoLocal(dataURL);
            mostrarFoto(dataURL);
            crearMiniFotoParticula(dataURL);
        };
        reader.readAsDataURL(file);
    });
});

function guardarFotoLocal(dataURL){
    let fotos = JSON.parse(localStorage.getItem("fotosValeria")) || [];
    fotos.push(dataURL);
    localStorage.setItem("fotosValeria", JSON.stringify(fotos));
}

function cargarFotosGuardadas(){
    let fotos = JSON.parse(localStorage.getItem("fotosValeria")) || [];
    fotos.forEach(f => {
        mostrarFoto(f);
        crearMiniFotoParticula(f);
    });
}

function mostrarFoto(src){
    const img = document.createElement("img");
    img.src = src;
    img.onload = () => { document.getElementById("galeria").appendChild(img); };
}

function borrarFotos(){
    localStorage.removeItem("fotosValeria");
    document.getElementById("galeria").innerHTML = "";
}

// Partículas flotantes de las fotos
function crearMiniFotoParticula(src){
    const p = document.createElement("img");
    p.src = src;
    p.className = "miniFoto";
    p.style.top = window.innerHeight + "px";
    p.style.left = Math.random() * (window.innerWidth - 80) + "px";
    document.body.appendChild(p);

    let y = window.innerHeight;
    let velocidad = 0.5 + Math.random() * 1;
    function anim(){
        y -= velocidad;
        p.style.top = y + "px";
        if(y > -100){ requestAnimationFrame(anim); }
        else p.remove();
    }
    anim();
}

// CARTA
const texto=`Valeria... Desde el 8 de enero de 2026 mi vida cambió. Gracias por tu sonrisa, por tus abrazos, por cada momento juntos. Eres lo mejor que me ha pasado y quiero seguir escribiendo esta historia contigo ❤️`;
let i=0;
function escribirCarta(){
    if(i<texto.length){
        document.getElementById("carta").textContent += texto.charAt(i);
        i++;
        setTimeout(escribirCarta,40);
    }
}

// ANIMACIONES
function animaciones(){
    let numCorazones=0, numConfeti=0;
    const maxCorazones=8, maxConfeti=10;
    function crearCorazon(){
        if(numCorazones>=maxCorazones) return;
        numCorazones++;
        const c=document.createElement("div");
        c.textContent="💖";
        c.className="corazon";
        c.style.left=Math.random()*window.innerWidth+"px";
        c.style.fontSize=(Math.random()*25+15)+"px";
        document.body.appendChild(c);
        let y=window.innerHeight;
        function anim(){ y-=1.5; c.style.top=y+"px"; if(y>0) requestAnimationFrame(anim); else {c.remove(); numCorazones--;}} anim();
    }
    function crearConfeti(){
        if(numConfeti>=maxConfeti) return;
        numConfeti++;
        const p=document.createElement("div");
        p.className="confeti";
        p.style.width="6px"; p.style.height="6px";
        p.style.backgroundColor="#ffbb00";
        p.style.left=Math.random()*window.innerWidth+"px";
        p.style.top="0px";
        document.body.appendChild(p);
        let t=0;
        function anim(){ t+=2; p.style.top=t+"px"; if(t<window.innerHeight) requestAnimationFrame(anim); else {p.remove(); numConfeti--;}} anim();
    }
    function loop(){ if(Math.random()<0.5) crearCorazon(); if(Math.random()<0.2) crearConfeti(); requestAnimationFrame(loop); }
    loop();
}

// PARTICULAS CURSOR
let lastCursorTime=0;
function particulasCursorThrottled(e){
    const now = Date.now();
    if(now - lastCursorTime < 200) return;
    lastCursorTime = now;
    const p=document.createElement("div");
    p.className="cursorParticula";
    p.textContent="💖";
    p.style.left=e.pageX+"px";
    p.style.top=e.pageY+"px";
    p.style.fontSize=(Math.random()*20+10)+"px";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),800);
}

// GALAXIA DE FONDO
function initGalaxia(){
    const canvas=document.getElementById("galaxia");
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
    const ctx=canvas.getContext("2d");
    const estrellas=[];
    for(let i=0;i<200;i++){ 
        estrellas.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, size:Math.random()*2+0.5, speed:Math.random()*0.3+0.1}); 
    }
    function anim(){ 
        ctx.fillStyle="rgba(0,0,0,0.1)"; 
        ctx.fillRect(0,0,canvas.width,canvas.height);
        for(let e of estrellas){ 
            e.y-=e.speed; 
            if(e.y<0) e.y=canvas.height; 
            ctx.fillStyle="#fff"; 
            ctx.fillRect(e.x,e.y,e.size,e.size); 
        } 
        requestAnimationFrame(anim); 
    } anim();
}

// MINI-JUEGO
function iniciarMiniJuego(){
    const seccionJuego = document.getElementById("juegoSection");
    let puntos = 0;
    const maxCorazones = 5;
    const corazonesActivos = [];
    function crearCorazonInteractivo(){
        if(corazonesActivos.length >= maxCorazones) return;
        const corazon = document.createElement("div");
        corazon.textContent = "💓";
        corazon.className = "corazon";
        corazon.style.position = "absolute";
        corazon.style.fontSize = (Math.random()*30 + 20) + "px";
        corazon.style.left = Math.random() * (seccionJuego.offsetWidth - 50) + "px";
        corazon.style.top = "-50px";
        seccionJuego.appendChild(corazon);
        corazonesActivos.push(corazon);
        corazon.animate([{ transform: "translateY(0px)" },{ transform: "translateY(400px)" }], { duration: 4000 + Math.random()*2000, easing: "linear" }).onfinish = ()=>{
            corazon.remove();
            corazonesActivos.splice(corazonesActivos.indexOf(corazon),1);
        };
        corazon.addEventListener("click", ()=>{
            puntos++;
            document.getElementById("puntos").textContent = puntos;
            corazon.remove();
            corazonesActivos.splice(corazonesActivos.indexOf(corazon),1);
        });
    }
    setInterval(crearCorazonInteractivo,1000);
}
</script>
</body>
</html>
